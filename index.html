<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>der包 · 个人空间
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

</head>
<body>
    <!-- 预加载器 -->
    <div class="preloader">
        <div class="preloader-inner">
            <div class="preloader-text">载入中</div>
            <div class="preloader-bar"></div>
        </div>
    </div>

    <!-- 鼠标跟随光标 -->
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#home" class="nav-logo">
                <span class="logo-text">der包</span>
            </a>
            <ul class="nav-links">
                <li><a href="#about" data-text="关于">关于</a></li>
                <li><a href="#works" data-text="作品">作品</a></li>
                <li><a href="#contact" data-text="联系">联系</a></li>
            </ul>
            <button class="nav-toggle" aria-label="菜单">
                <span></span>

        </div>
    </nav>

    <!-- Hero区域 -->
    <section id="home" class="hero">
        <div class="hero-bg">
            <img src="图片/ba5585814c8afe949d10e248d6f07df5.jpg" alt="背景" class="hero-image">
            <div class="hero-overlay"></div>
        </div>
        <div class="hero-content">
            <div class="hero-subtitle-wrap">
                <span class="hero-subtitle">der包 · 创意空间</span>
            </div>
            <h1 class="hero-title">
                <span class="title-line">欢迎来到</span>
                <span class="title-line">der包的</span>
                <span class="title-line accent">小世界</span>
            </h1>
            <div class="hero-scroll">
                <span class="scroll-text">向下探索</span>
                <div class="scroll-line">
                    <div class="scroll-dot"></div>
                </div>
            </div>
        </div>
        <div class="hero-side-text">
            <span>SCROLL TO EXPLORE</span>
        </div>
    </section>

    <!-- 关于我 -->
    <section id="about" class="about">
        <div class="about-bg-text">ABOUT</div>
        <div class="container">
            <div class="about-header">
                <span class="section-label">01</span>
                <h2 class="section-title">关于我</h2>
            </div>
            <div class="about-grid">
                <div class="about-image">
                    <div class="about-image-frame">
                        <div class="about-image-placeholder">
                            <span>你的照片</span>
                        </div>
                        <div class="about-image-border"></div>
                    </div>
                    <div class="about-image-caption">
                        <span class="caption-year">2019 - 至今</span>
                        <span class="caption-text">持续创作中</span>
                    </div>
                </div>
                <div class="about-content">
                    <p class="about-intro">
                        你好，我是<span class="highlight">der包</span>。
                        <br>一个喜欢折腾各种有趣东西的人。
                    </p>
                    <div class="about-divider"></div>
                    <p class="about-text">
                        这里是我的小小空间，记录着我感兴趣的一切——
                        好用的工具、踩过的坑、生活中的小发现，
                        还有那些让人觉得"哇，原来还可以这样"的瞬间。
                    </p>
                    <div class="about-stats">
                        <div class="stat">
                            <span class="stat-number" data-count="30">0</span>
                            <span class="stat-label">文章</span>
                        </div>
                        <div class="stat">
                            <span class="stat-number" data-count="50">0</span>
                            <span class="stat-label">项目</span>
                        </div>
                        <div class="stat">
                            <span class="stat-number" data-count="3">0</span>
                            <span class="stat-label">年折腾</span>
                        </div>
                    </div>
                    <a href="#works" class="btn-primary">
                        <span>浏览作品</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- 作品集 -->
    <section id="works" class="works">
        <div class="works-bg-text">WORKS</div>
        <div class="container">
            <div class="works-header">
                <span class="section-label">02</span>
                <h2 class="section-title">作品集</h2>
                <p class="section-desc">一些做过的东西，和一些想说的话</p>

            <div class="works-filter">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="project">项目</button>
                <button class="filter-btn" data-filter="note">随笔</button>
            </div>

            <div class="works-grid">
                <!-- 作品1 -->
                <article class="work-item" data-category="project">
                    <div class="work-image">
                        <div class="work-placeholder project">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                        </div>
                        <div class="work-overlay">
                            <span class="work-category">项目</span>
                            <span class="work-year">2024</span>
                        </div>
                    </div>
                    <div class="work-info">
                        <h3 class="work-title">个人主页构建记</h3>
                        <p class="work-date">2024年4月</p>
                        <p class="work-desc">从零开始搭建这个个人空间，记录过程中的思考与选择。</p>
                    </div>
                </article>

                <!-- 作品2 -->
                <article class="work-item" data-category="note">
                    <div class="work-image">
                        <div class="work-placeholder note">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                            </svg>
                        </div>
                        <div class="work-overlay">
                            <span class="work-category">随笔</span>
                            <span class="work-year">2024</span>
                        </div>
                    </div>
                    <div class="work-info">
                        <h3 class="work-title">关于效率工具的一点思考</h3>
                        <p class="work-date">2024年3月</p>
                        <p class="work-desc">工具越多真的越高效吗？分享我精简工作流的心得。</p>
                    </div>
                </article>

                <!-- 作品3 -->
                <article class="work-item" data-category="project">
                    <div class="work-image">
                        <div class="work-placeholder project">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                        </div>
                        <div class="work-overlay">
                            <span class="work-category">项目</span>
                            <span class="work-year">2024</span>
                        </div>
                    </div>
                    <div class="work-info">
                        <h3 class="work-title">自动化小工具</h3>
                        <p class="work-date">2024年2月</p>
                        <p class="work-desc">写了一个小脚本，让重复的工作自动完成，省下时间做更有趣的事。</p>
                    </div>
                </article>

                <!-- 作品4 -->
                <article class="work-item" data-category="note">
                    <div class="work-image">
                        <div class="work-placeholder note">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                            </svg>
                        </div>
                        <div class="work-overlay">
                            <span class="work-category">随笔</span>
                            <span class="work-year">2024</span>
                        </div>
                    </div>
                    <div class="work-info">
                        <h3 class="work-title">慢下来，才能看见</h3>
                        <p class="work-date">2024年3月</p>
                        <p class="work-desc">生活节奏越快，越需要刻意放慢脚步，去注意那些被忽略的细节。</p>
                    </div>
                </article>

                <!-- 作品5 -->
                <article class="work-item" data-category="project">
                    <div class="work-image">
                        <div class="work-placeholder project">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                        </div>
                        <div class="work-overlay">
                            <span class="work-category">项目</span>
                            <span class="work-year">2024</span>
                        </div>
                    </div>
                    <div class="work-info">
                        <h3 class="work-title">命令行工具箱</h3>
                        <p class="work-date">2024年1月</p>
                        <p class="work-desc">整理了一份常用命令行工具的清单和配置分享。</p>
                    </div>
                </article>

                <!-- 作品6 -->
                <article class="work-item" data-category="note">
                    <div class="work-image">
                        <div class="work-placeholder note">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                            </svg>
                        </div>
                        <div class="work-overlay">
                            <span class="work-category">随笔</span>
                            <span class="work-year">2024</span>
                        </div>
                    </div>
                    <div class="work-info">
                        <h3 class="work-title">我的桌面布置分享</h3>
                        <p class="work-date">2024年3月</p>
                        <p class="work-desc">一个好的工作环境，能让人更容易进入心流状态。</p>
                    </div>
                </article>
            </div>
        </div>

                <p class="contact-text">
                    有任何想法或问题，<br>欢迎随时来找我聊聊。
                </p>
                <a href="mailto:171871446@qq.com" class="btn-primary large">
                    <span>发送邮件</span>

                    <a href="#" class="social-link">
